<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Jigsaw</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;500;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
<div id="app">

  <!-- ============ Home Screen ============ -->
  <div v-if="currentScreen === 'home'" class="screen screen-home">
    <header class="home-header">
      <h1>Jigsaw</h1>
      <p class="home-subtitle">Choose a collection</p>
    </header>
    <div class="pack-gallery">
      <button
        v-for="pack in packs" :key="pack.name"
        class="pack-card"
        @click="selectPackAndGo(pack)"
      >
        <div class="pack-card-mosaic">
          <img v-for="img in packPreviewImages(pack)" :key="img" :src="img" :alt="pack.label" loading="lazy">
        </div>
        <div class="pack-card-info">
          <span class="pack-card-name">{{ pack.label }}</span>
          <span class="pack-card-count">{{ pack.images.length }} images</span>
        </div>
      </button>
    </div>
  </div>

  <!-- ============ Image Picker ============ -->
  <div v-if="currentScreen === 'picker'" class="screen screen-picker">
    <header class="picker-header">
      <button class="back-btn" @click="navigateTo('home')">&larr;</button>
      <h2>{{ currentPack ? currentPack.label : '' }}</h2>
    </header>
    <div class="image-grid">
      <button
        v-for="(img, i) in (currentPack ? currentPack.images : [])" :key="img"
        class="image-card"
        @click="selectImageAndGo(img)"
      >
        <img :src="img" :alt="'Image ' + (i + 1)" loading="lazy">
      </button>
    </div>
  </div>

  <!-- ============ Setup Screen ============ -->
  <div v-if="currentScreen === 'setup'" class="screen screen-setup">
    <header class="setup-header">
      <button class="back-btn" @click="navigateTo('picker')">&larr;</button>
      <h2>Choose Difficulty</h2>
    </header>
    <div class="setup-body">
      <div class="setup-preview">
        <img :src="selectedImage" alt="Selected puzzle">
      </div>
      <div class="difficulty-options">
        <button class="difficulty-btn" @click="startPuzzle(2)">
          <span class="difficulty-label">Kids</span>
          <span class="difficulty-pieces">{{ pieceCountForCols(2) }} pieces</span>
        </button>
        <button class="difficulty-btn" @click="startPuzzle(4)">
          <span class="difficulty-label">Easy</span>
          <span class="difficulty-pieces">{{ pieceCountForCols(4) }} pieces</span>
        </button>
        <button class="difficulty-btn" @click="startPuzzle(6)">
          <span class="difficulty-label">Medium</span>
          <span class="difficulty-pieces">{{ pieceCountForCols(6) }} pieces</span>
        </button>
        <button class="difficulty-btn" @click="startPuzzle(8)">
          <span class="difficulty-label">Hard</span>
          <span class="difficulty-pieces">{{ pieceCountForCols(8) }} pieces</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ============ Puzzle Screen ============ -->
  <div v-if="currentScreen === 'puzzle'" class="screen screen-puzzle">

    <!-- Toolbar -->
    <div class="puzzle-toolbar">
      <button class="toolbar-btn" @click="confirmGoHome" title="Home">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
      </button>
      <span class="toolbar-title">Jigsaw</span>
      <div class="toolbar-spacer"></div>
      <span class="toolbar-moves">{{ moveCount }} moves</span>
      <button class="toolbar-btn" @click="undo" :disabled="!canUndo" title="Undo">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="1 4 1 10 7 10"/>
          <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
        </svg>
      </button>
      <button class="toolbar-btn" @click="toggleSound" :title="soundOn ? 'Mute' : 'Unmute'">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path v-if="soundOn" d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
          <line v-if="!soundOn" x1="23" y1="9" x2="17" y2="15"/>
          <line v-if="!soundOn" x1="17" y1="9" x2="23" y2="15"/>
        </svg>
      </button>
      <div class="toolbar-divider"></div>
      <button class="toolbar-btn toolbar-btn-accent" @click="confirmNewPuzzle" title="New Puzzle">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/>
          <rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/>
          <rect x="3" y="14" width="7" height="7"/>
        </svg>
      </button>
      <button class="toolbar-btn toolbar-btn-subtle" @click="settingsOpen = !settingsOpen" title="Settings">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>

      <!-- Settings dropdown -->
      <div v-if="settingsOpen" class="settings-dropdown" @click.stop>
        <label class="settings-checkbox">
          <input type="checkbox" v-model="breakGroupsOption"> Break groups on drop
        </label>
        <hr class="settings-divider">
        <button class="settings-action" @click="reportBug(); settingsOpen = false" :disabled="bugStatus === 'sending'">Report Bug</button>
        <div v-if="bugStatus" class="settings-status">{{ bugStatus }}</div>
      </div>
    </div>
    <div v-if="settingsOpen" class="settings-backdrop" @click="settingsOpen = false"></div>

    <!-- Board -->
    <div id="board-wrap">
      <div id="board"
        :style="boardStyle"
        @pointerdown.prevent="onPointerDown"
        @pointermove.prevent="onPointerMove"
        @pointerup.prevent="onPointerUp"
        @pointercancel.prevent="onPointerUp"
      >
        <div
          v-for="tile in tiles"
          :key="tile.id"
          class="tile"
          :class="tileClasses(tile)"
          :style="tileStyle(tile)"
          :data-tile-id="tile.id"
        ></div>

        <div
          v-for="(h, i) in dropHighlights"
          :key="'h'+i"
          class="drop-highlight"
          :class="{ invalid: !dropValid }"
          :style="{ left: h.col * tileW + 'px', top: h.row * tileH + 'px', width: tileW + 'px', height: tileH + 'px' }"
        ></div>

        <div v-if="won" id="victory-overlay">
          <video v-if="victoryVideo" :src="victoryVideo" autoplay loop muted playsinline
            preload="auto" id="victory-video"
            @loadeddata="$event.target.muted = true; $event.target.play().catch(() => {})"></video>
          <h2>Solved!</h2>
          <div class="victory-actions">
            <button class="victory-btn-primary" @click="confirmNewPuzzle">New Puzzle</button>
            <button class="victory-btn-secondary" @click="confirmGoHome">Home</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============ Confirmation modal ============ -->
  <div v-if="pendingAction" class="confirm-overlay" @click="pendingAction = null">
    <div class="confirm-dialog" @click.stop>
      <p>Abandon current puzzle?</p>
      <div class="confirm-buttons">
        <button class="confirm-cancel" @click="pendingAction = null">Cancel</button>
        <button class="confirm-yes" @click="confirmYes">Yes</button>
      </div>
    </div>
  </div>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
